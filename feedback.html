<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Nexus - Submit Feedback</title>
    <link rel="stylesheet" href="global.css">
    <style>
        .form-textarea { width: 100%; padding: 1rem; border: 1px solid #cbd5e1; border-radius: var(--radius-sm); outline: none; transition: var(--transition); font-family: inherit; resize: vertical; min-height: 150px; }
        .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .feedback-header { text-align: center; margin-bottom: 2rem; }
        .feedback-header h1 { color: var(--nav-bg); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .feedback-header p { color: var(--text-muted); font-size: 1.1rem; }
    </style>
</head>
<body>

    <nav>
        <h2>📬 Feedback & Support</h2>
        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Back</button>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="feedback-header">
            <h1>We're Listening</h1>
            <p>Found a bug? Have an idea for a new game? Let us know!</p>
        </div>

        <div class="card">
            <textarea id="feedbackMsg" class="form-textarea" placeholder="Type your feedback here..."></textarea>
            <button class="btn btn-primary" id="submitFeedbackBtn" style="margin-top: 1.5rem; width: 100%;">Submit Feedback</button>
        </div>
        
        <div id="successMessage" style="display: none; text-align: center; margin-top: 1.5rem; color: var(--secondary); font-weight: bold;">
            ✅ Thank you! Your feedback has been sent to the admin team.
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let currentUserName = "Student";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Fetch the user's name so the admin knows who sent it
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) currentUserName = userDoc.data().name;
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('submitFeedbackBtn').addEventListener('click', async () => {
            const msg = document.getElementById('feedbackMsg').value.trim();
            if (!msg || !currentUser) return alert("Please type a message first.");

            try {
                await addDoc(collection(db, "feedback"), {
                    userId: currentUser.uid,
                    userName: currentUserName,
                    message: msg,
                    status: "pending",
                    timestamp: serverTimestamp()
                });
                
                document.getElementById('feedbackMsg').value = '';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => document.getElementById('successMessage').style.display = 'none', 4000);
            } catch (error) {
                console.error("Error submitting feedback:", error);
                alert("Failed to submit feedback.");
            }
        });
    </script>
</body>
</html>
