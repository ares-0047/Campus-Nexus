<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Nexus - Direct Messages</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Split Screen Layout */
        .dm-layout { flex: 1; display: flex; max-width: 1200px; margin: 1rem auto; width: 100%; gap: 1rem; padding: 0 1rem; height: calc(100vh - 100px); }
        
        /* Left Side: User List */
        .user-sidebar { width: 300px; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: var(--primary); }
        .user-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        
        /* Individual User Item */
        .user-item { display: flex; align-items: center; gap: 10px; padding: 0.8rem; border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .user-item:hover { background: rgba(255,255,255,0.9); border-color: #cbd5e1; transform: translateX(5px); }
        .user-item.active { background: var(--primary); color: white; }
        .user-item.active .online-dot { border-color: var(--primary); }
        
        .user-avatar-small { width: 35px; height: 35px; border-radius: 50%; background: var(--nav-bg); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; border: 2px solid white; display: none; }
        .online-dot.is-online { display: block; }

        /* Right Side: Chat Area */
        .chat-area { flex: 1; background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); }
        
        .chat-header { padding: 1rem; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: var(--text-main); display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.5); border-radius: var(--radius-md) var(--radius-md) 0 0; }
        
        .messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .message { max-width: 75%; padding: 0.8rem 1.2rem; border-radius: 1.2rem; font-size: 0.95rem; word-wrap: break-word; }
        .my-message { background-color: var(--primary); color: var(--text-light); align-self: flex-end; border-bottom-right-radius: 0.3rem; }
        .other-message { background-color: white; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 0.3rem; border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); }
        
        .input-area { display: flex; padding: 1rem; background: rgba(255,255,255,0.8); border-top: 1px solid #e2e8f0; gap: 0.5rem; border-radius: 0 0 var(--radius-md) var(--radius-md); }
        #messageInput { flex: 1; padding: 0.8rem 1.2rem; border: 1px solid #cbd5e1; border-radius: 2rem; outline: none; transition: var(--transition); }
        #messageInput:focus { border-color: var(--primary); }
        #sendBtn { border-radius: 2rem; padding: 0.8rem 1.5rem; }

        /* Empty State */
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.1rem; flex-direction: column; gap: 10px; }
        
        @media (max-width: 768px) {
            .dm-layout { flex-direction: column; height: auto; }
            .user-sidebar { width: 100%; height: 250px; }
            .chat-area { height: 500px; }
        }
        /* Ensure the body doesn't scroll, only the message area */
        body {
          height: 100vh;
         display: flex;
         flex-direction: column;
        overflow: hidden;
        }

        .messages {
          flex: 1; /* This pushes the input area to the bottom */
         overflow-y: auto;
         -webkit-overflow-scrolling: touch; /* Smooth scrolling for iPhones */
        }
    </style>
</head>
<body>

    <nav>
        <h2>👤 Direct Messages</h2>
        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Back</button>
    </nav>

    <div class="dm-layout animate-entry">
        <div class="user-sidebar">
            <div class="sidebar-header">Campus Directory</div>
            <div class="user-list" id="userList">
                <div style="padding: 1rem; color: var(--text-muted);">Loading students...</div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyState">
                <span style="font-size: 3rem;">👋</span>
                <p>Select a student from the directory to start chatting.</p>
            </div>
            
            <div style="display: none; flex-direction: column; height: 100%;" id="activeChatUI">
                <div class="chat-header" id="chatHeader">
                    <div class="user-avatar-small" id="headerAvatar">S</div>
                    <span id="headerName">Student Name</span>
                </div>
                
                <div class="messages" id="messagesArea"></div>
                
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Message..." autocomplete="off">
                    <button id="sendBtn" class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./private-chat.js"></script>
</body>
</html>
