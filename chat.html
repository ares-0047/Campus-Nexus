<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Nexus - Global Chat</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body { height: 100vh; overflow: hidden; }
        
        /* Chat Container Layout */
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; background: var(--surface); box-shadow: var(--shadow-sm); border-radius: var(--radius-md) var(--radius-md) 0 0; margin-top: 1rem; }
        
        /* 🟢 Active Users Bar Styling */
        .active-users-bar { display: flex; gap: 12px; padding: 1rem 1.5rem; background: rgba(255,255,255,0.8); border-bottom: 1px solid #e2e8f0; overflow-x: auto; scrollbar-width: none; align-items: center; }
        .active-users-bar::-webkit-scrollbar { display: none; }
        
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; position: relative; flex-shrink: 0; box-shadow: var(--shadow-sm); cursor: pointer; transition: 0.2s; }
        .user-avatar:hover { transform: translateY(-3px); }
        
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: var(--secondary); border-radius: 50%; border: 2px solid white; }
        
        .user-name-tooltip { position: absolute; bottom: -22px; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; opacity: 0; transition: 0.2s; font-weight: 600; background: var(--surface); padding: 2px 6px; border-radius: 4px; border: 1px solid #e2e8f0; pointer-events: none; z-index: 10; }
        .user-avatar:hover .user-name-tooltip { opacity: 1; }

        /* Existing Chat Styles */
        .messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; background-color: rgba(255,255,255,0.4); backdrop-filter: blur(10px); }
        .message { max-width: 75%; padding: 0.8rem 1.2rem; border-radius: 1.2rem; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        .my-message { background-color: var(--primary); color: var(--text-light); align-self: flex-end; border-bottom-right-radius: 0.3rem; }
        .other-message { background-color: var(--surface); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 0.3rem; border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); }
        .sender-name { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.3rem; opacity: 0.8; color: var(--primary); }
        .my-message .sender-name { display: none; }

        .input-area { display: flex; padding: 1rem; background: var(--surface); border-top: 1px solid #e2e8f0; gap: 0.5rem; align-items: center; }
        #messageInput { flex: 1; padding: 0.8rem 1.2rem; border: 1px solid #cbd5e1; border-radius: 2rem; outline: none; transition: var(--transition); }
        #messageInput:focus { border-color: var(--primary); }
        #sendBtn { border-radius: 2rem; padding: 0.8rem 1.5rem; }
        /* Ensure the body doesn't scroll, only the message area */
        body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        }

        .messages {
        flex: 1; /* This pushes the input area to the bottom */
        overflow-y: auto;
        -webkit-overflow-scrolling: touch; /* Smooth scrolling for iPhones */
        }
    </style>
</head>
<body>

    <nav>
        <h2>💬 Global Nexus Chat</h2>
        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Back</button>
    </nav>

    <div class="chat-container animate-entry delay-1">
        
        <div class="active-users-bar" id="activeUsersArea">
            <span style="color: var(--text-muted); font-size: 0.9rem;">Loading active users...</span>
        </div>

        <div class="messages" id="messagesArea">
            </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message to the campus..." autocomplete="off">
            <button id="sendBtn" class="btn btn-primary">Send</button>
        </div>
    </div>

    <script type="module" src="./chat.js"></script>
</body>
</html>
